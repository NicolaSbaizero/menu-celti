<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Ristorante</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
               url('sfondo.jpg');
    background-size:cover;
    background-position:center;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    width:90%;
    max-width:420px;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(12px);
    border-radius:18px;
    padding:45px 30px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.logo{
    width:110px;
    margin-bottom:15px;
}

h1{
    font-family:'Cormorant Garamond',serif;
    font-size:42px;
    font-weight:600;
    margin-bottom:8px;
}

p{
    color:#ececec;
    margin-bottom:35px;
    font-size:15px;
}

.button{
    display:block;
    width:100%;
    text-decoration:none;
    background:white;
    color:#222;
    padding:17px;
    border-radius:12px;
    margin:15px 0;
    font-size:18px;
    font-weight:500;
    transition:.25s;
}

.button:hover{
    transform:translateY(-2px);
    background:#f2f2f2;
}

.footer{
    margin-top:28px;
    font-size:12px;
    color:#cccccc;
}
</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="Logo">

<h1>Benvenuti</h1>

<p>
Welcome • Willkommen
<br><br>
Seleziona la lingua
</p>

<a class="button" href="menu-it.pdf" target="_blank">🇮🇹 Italiano</a>
<a class="button" href="menu-en.pdf" target="_blank">🇬🇧 English</a>
<a class="button" href="menu-de.pdf" target="_blank">🇩🇪 Deutsch</a>

<div class="footer">
Buon appetito • Enjoy your meal • Guten Appetit
</div>

</div>

</body>
</html>
